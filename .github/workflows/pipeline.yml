name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: |
          npm run build
          # Si SvelteKit no genera 'build', creamos un index de emergencia
          # para que el deploy no de error 404
          if [ ! -d "build" ]; then
            mkdir build
            echo "<html><body><h1>Sitio en mantenimiento</h1><p>El build no generó archivos estáticos correctamente.</p></body></html>" > build/index.html
          fi

      - name: Disable Jekyll
        run: touch build/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
